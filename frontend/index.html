<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veritas AI - Fact Checker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #1e293b;
      border-radius: 10px;
    }

    .sources {
      margin-top: 15px;
    }

    .source {
      margin-bottom: 10px;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    .loading {
      text-align: center;
      margin-top: 10px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧠 Veritas AI</h1>

    <textarea id="input" placeholder="Enter news or claim..."></textarea>

    <button onclick="analyzeNews()">Analyze</button>

    <div class="loading" id="loading"></div>

    <div class="result" id="result" style="display:none;"></div>
  </div>

  <script>
    const API_URL = "https://workbysaksham.onrender.com"; // 🔴 CHANGE THIS

    async function analyzeNews() {
      const text = document.getElementById("input").value.trim();
      const resultDiv = document.getElementById("result");
      const loading = document.getElementById("loading");

      if (!text) {
        alert("Enter something first");
        return;
      }

      resultDiv.style.display = "none";
      loading.innerText = "Analyzing...";

      try {
        const res = await fetch(`${API_URL}/analyze`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text })
        });

        const data = await res.json();

        console.log("API:", data); // DEBUG

        loading.innerText = "";

        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
          <h2>Verdict: ${data.verdict}</h2>
          <p><strong>Confidence:</strong> ${data.confidence}%</p>
          <p>${data.reasoning}</p>

          <div class="sources">
            <h3>Sources:</h3>
            ${
              data.sources?.length
                ? data.sources.map(s => `
                  <div class="source">
                    🔗 <a href="${s.url}" target="_blank">${s.title}</a><br/>
                    <small>${s.source}</small>
                  </div>
                `).join("")
                : "<p>No sources available</p>"
            }
          </div>
        `;

      } catch (err) {
        console.error(err);

        loading.innerText = "";
        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
          <h2>Error</h2>
          <p>Unable to connect to server</p>
        `;
      }
    }
  </script>
</body>
</html>
