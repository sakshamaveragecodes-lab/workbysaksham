<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Veritas AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px 20px;
}

.header h1 {
  font-size: 32px;
  margin: 0;
}

.header p {
  color: #94a3b8;
}

/* SEARCH BAR */
.search-box {
  display: flex;
  max-width: 800px;
  margin: auto;
  background: #1e293b;
  border-radius: 14px;
  overflow: hidden;
}

.search-box input {
  flex: 1;
  padding: 16px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

.search-box button {
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border: none;
  padding: 0 24px;
  color: white;
  cursor: pointer;
}

/* BADGES */
.badges {
  text-align: center;
  margin-top: 15px;
}

.badge {
  display: inline-block;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 999px;
  background: #1e293b;
  color: #94a3b8;
  font-size: 12px;
}

/* MAIN LAYOUT */
.main {
  display: flex;
  gap: 20px;
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 20px;
}

.left, .right {
  flex: 1;
}

/* CARD */
.card {
  background: linear-gradient(135deg, #064e3b, #022c22);
  border-radius: 16px;
  padding: 20px;
}

/* RESULT HEADER */
.verdict {
  font-size: 26px;
  font-weight: bold;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #facc15; }

/* CONFIDENCE BAR */
.bar {
  height: 12px;
  background: #1e293b;
  border-radius: 10px;
  margin-top: 10px;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border-radius: 10px;
}

/* SECTION */
.section {
  margin-top: 20px;
}

.section h3 {
  margin-bottom: 10px;
}

/* SOURCES */
.source {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}

/* SIDE PANEL */
.side-card {
  background: #1e293b;
  border-radius: 16px;
  padding: 20px;
}

.loading {
  text-align: center;
  margin-top: 15px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="header">
  <h1>🧠 Veritas AI</h1>
  <p>Real-time news analysis. Trusted answers.</p>
</div>

<div class="search-box">
  <input id="input" placeholder="Search news..." />
  <button onclick="analyzeNews()">Analyze ✨</button>
</div>

<div class="badges">
  <span class="badge">Multi-source</span>
  <span class="badge">Real-time</span>
  <span class="badge">Bias-aware</span>
  <span class="badge">AI-verified</span>
</div>

<div class="loading" id="loading"></div>

<div class="main">
  <div class="left" id="result"></div>
  <div class="right" id="sourcesPanel"></div>
</div>

<script>
const API_URL = "https://workbysaksham.onrender.com";

function getClass(verdict) {
  verdict = verdict.toLowerCase();
  if (verdict.includes("real")) return "green";
  if (verdict.includes("misleading")) return "red";
  return "yellow";
}

async function analyzeNews() {
  const text = document.getElementById("input").value.trim();
  const resultDiv = document.getElementById("result");
  const sourcesDiv = document.getElementById("sourcesPanel");
  const loading = document.getElementById("loading");

  if (!text) return alert("Enter something");

  loading.innerText = "Analyzing...";
  resultDiv.innerHTML = "";
  sourcesDiv.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    loading.innerText = "";

    const cls = getClass(data.verdict);

    /* LEFT MAIN CARD */
    resultDiv.innerHTML = `
      <div class="card">
        <div class="verdict ${cls}">${data.verdict}</div>

        <p>${data.reasoning}</p>

        <div class="section">
          <strong>Confidence: ${data.confidence}%</strong>
          <div class="bar">
            <div class="fill" style="width:${data.confidence}%"></div>
          </div>
        </div>

        <div class="section">
          <h3>Key Reasons</h3>
          <ul>
            <li>Multiple sources analyzed</li>
            <li>Cross-checked headlines</li>
            <li>Consistency in reporting</li>
          </ul>
        </div>
      </div>
    `;

    /* RIGHT SOURCES PANEL */
    sourcesDiv.innerHTML = `
      <div class="side-card">
        <h3>Top Sources</h3>
        ${
          data.sources?.length
            ? data.sources.map(s => `
              <div class="source">
                <a href="${s.url}" target="_blank">${s.title}</a><br/>
                <small>${s.source}</small>
              </div>
            `).join("")
            : "<p>No sources found</p>"
        }
      </div>
    `;

  } catch (err) {
    loading.innerText = "";
    resultDiv.innerHTML = `<div class="card">⚠️ Server error</div>`;
  }
}
</script>

</body>
</html>
