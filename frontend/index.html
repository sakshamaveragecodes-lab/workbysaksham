<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas | AI Fact Checker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --accent: #3b82f6;
      --real: #10b981;
      --fake: #ef4444;
      --uncertain: #f59e0b;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    h1 span { color: var(--accent); }

    .input-group {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    textarea {
      width: 100%;
      height: 120px;
      background: var(--bg);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 15px;
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 15px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading Spinner */
    .loader {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
    }

    /* Results Card */
    #result-container { margin-top: 30px; }
    
    .result-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      border-left: 6px solid #334155;
      animation: fadeIn 0.4s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-Real { border-color: var(--real); }
    .status-Real h2 { color: var(--real); }
    
    .status-Fake { border-color: var(--fake); }
    .status-Fake h2 { color: var(--fake); }
    
    .status-Uncertain { border-color: var(--uncertain); }
    .status-Uncertain h2 { color: var(--uncertain); }

    .result-card h2 { margin-bottom: 10px; font-size: 1.8rem; }
    .result-card p { font-size: 1.1rem; margin-bottom: 20px; color: #cbd5e1; }

    .sources-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .source-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .source-item {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--accent);
      font-size: 0.95rem;
      border: 1px solid #334155;
      transition: border-color 0.2s;
    }

    .source-item:hover { border-color: var(--accent); }
    .source-item span { color: #94a3b8; font-size: 0.85rem; display: block; margin-top: 4px; }

  </style>
</head>
<body>

<div class="container">
  <h1>Veritas <span>AI</span></h1>
  
  <div class="input-group">
    <textarea id="input" placeholder="Paste a news headline, tweet, or claim here to verify..."></textarea>
    <button id="btn" onclick="checkNews()">Analyze Claim</button>
  </div>

  <div id="loader" class="loader">Analyzing thousands of data points...</div>
  <div id="result-container"></div>
</div>

async function checkNews() {
  const text = document.getElementById("input").value;
  const btn = document.getElementById("btn");
  const loader = document.getElementById("loader");
  const resultDiv = document.getElementById("result-container");

  if (!text.trim()) {
    alert("Please enter a claim to verify.");
    return;
  }

  // UI Setup for loading
  btn.disabled = true;
  btn.innerText = "Analyzing...";
  loader.style.display = "block";
  resultDiv.innerHTML = "";

  try {
    const res = await fetch(`${BASE_URL}/check-news`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    if (!res.ok) throw new Error("Server response was not ok.");
    
    const data = await res.json();

    // Build Sources HTML
    let sourcesHTML = "";
    if (data.sources && data.sources.length > 0) {
      const links = data.sources.map(s => 
        `<a href="${s.url}" target="_blank" class="source-item">
          ${s.title} <span>Source: ${s.source}</span>
        </a>`
      ).join("");
      
      sourcesHTML = `
        <div class="sources-title">Verified Sources Referenced:</div>
        <div class="source-list">${links}</div>
      `;
    } else {
      sourcesHTML = `<div class="sources-title">No direct news links available for this specific query.</div>`;
    }

    // Render Card
    resultDiv.innerHTML = `
      <div class="result-card status-${data.label}">
        <h2>${data.label} <span style="font-size: 1rem; color: #94a3b8;">(${data.confidence} Confidence)</span></h2>
        <p>${data.reason}</p>
        ${sourcesHTML}
      </div>
    `;

  } catch (error) {
    resultDiv.innerHTML = `
      <div class="result-card status-Fake">
        <h2>Connection Error</h2>
        <p>Failed to connect to the backend server. Please ensure Render is online.</p>
      </div>
    `;
  } finally {
    // Reset UI
    btn.disabled = false;
    btn.innerText = "Analyze Claim";
    loader.style.display = "none";
  }
}
</script>

</body>
</html>
