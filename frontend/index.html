<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Veritas AI</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h1 {
  font-size: 36px;
  margin: 0;
  letter-spacing: 1px;
}

.header p {
  color: #94a3b8;
}

/* SEARCH */
.search-box {
  display: flex;
  max-width: 800px;
  margin: 25px auto;
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(14px);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.search-box input {
  flex: 1;
  padding: 16px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 16px;
}

.search-box button {
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  border: none;
  padding: 0 24px;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.search-box button:hover {
  transform: scale(1.05);
}

/* BADGES */
.badges {
  text-align: center;
}

.badge {
  display: inline-block;
  padding: 6px 12px;
  margin: 5px;
  border-radius: 999px;
  background: #1e293b;
  color: #94a3b8;
  font-size: 12px;
}

/* LAYOUT */
.main {
  display: flex;
  gap: 20px;
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

.left, .right {
  flex: 1;
}

/* CARD */
.card {
  background: rgba(15, 23, 42, 0.65);
  backdrop-filter: blur(20px);
  border-radius: 18px;
  padding: 22px;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* VERDICT */
.verdict {
  font-size: 28px;
  font-weight: bold;
}

.green { color: #22c55e; }
.red { color: #ef4444; }
.yellow { color: #facc15; }

/* CONF BAR */
.bar {
  height: 12px;
  background: #1e293b;
  border-radius: 10px;
  margin-top: 10px;
}

.fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
}

/* SECTION */
.section {
  margin-top: 20px;
}

/* SOURCES */
.source {
  background: rgba(2,6,23,0.7);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  transition: 0.2s;
}

.source:hover {
  transform: translateX(5px);
}

a {
  color: #60a5fa;
  text-decoration: none;
}

/* SIDE PANEL */
.side-card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 20px;
}

/* LOADING */
.loading {
  text-align: center;
  margin-top: 20px;
  color: #94a3b8;
}

/* MOBILE */
@media(max-width: 900px) {
  .main {
    flex-direction: column;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>🧠 Veritas AI</h1>
  <p>Multi-source intelligence engine for truth verification</p>
</div>

<div class="search-box">
  <input id="input" placeholder="Ask anything news-related..." 
onkeydown="if(event.key==='Enter') analyzeNews()" />
  <button onclick="analyzeNews()">Analyze ✨</button>
</div>

<div class="badges">
  <span class="badge">AI Analysis</span>
  <span class="badge">Multi-Source</span>
  <span class="badge">Credibility Engine</span>
  <span class="badge">Bias Detection</span>
</div>

<div class="loading" id="loading"></div>

<div class="main">
  <div class="left" id="result"></div>
  <div class="right" id="sourcesPanel"></div>
</div>

<script>
const API_URL = "https://workbysaksham.onrender.com";

function getClass(verdict) {
  verdict = verdict.toLowerCase();
  if (verdict.includes("real")) return "green";
  if (verdict.includes("misleading")) return "red";
  return "yellow";
}

async function analyzeNews() {
  const text = document.getElementById("input").value.trim();
  const resultDiv = document.getElementById("result");
  const sourcesDiv = document.getElementById("sourcesPanel");
  const loading = document.getElementById("loading");

  if (!text) return alert("Enter something");

  loading.innerText = "🧠 Analyzing across sources...";
  resultDiv.innerHTML = "";
  sourcesDiv.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    loading.innerText = "";

    const cls = getClass(data.verdict);

    /* MAIN CARD */
    resultDiv.innerHTML = `
      <div class="card">
        <div class="verdict ${cls}">
          ${data.verdict}
        </div>

        <p>${data.reasoning}</p>

        <div class="section">
          <strong>Confidence: ${data.confidence}%</strong>
          <div class="bar">
            <div class="fill" style="width:${data.confidence}%"></div>
          </div>
        </div>

        <div class="section">
          <h3>AI Signals</h3>
          <ul>
            <li>📊 Coverage strength</li>
            <li>🧠 Source credibility</li>
            <li>⚖️ Agreement consistency</li>
            <li>🚫 Noise filtering</li>
          </ul>
        </div>
      </div>
    `;

    /* SOURCES */
    sourcesDiv.innerHTML = `
      <div class="side-card">
        <h3>Top Sources</h3>
        ${
          data.sources?.length
            ? data.sources.map(s => `
              <div class="source">
                <a href="${s.url}" target="_blank">${s.title}</a><br/>
                <small>${s.source}</small>
              </div>
            `).join("")
            : "<p>No sources found</p>"
        }
      </div>
    `;

  } catch (err) {
    loading.innerText = "";
    resultDiv.innerHTML = `<div class="card">⚠️ Server error</div>`;
  }
}
</script>

</body>
</html>
