<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Fact Checker</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    textarea {
      width: 80%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .result {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
    }

    .real { background: #064e3b; }
    .fake { background: #7f1d1d; }
    .uncertain { background: #78350f; }

    .confidence {
      font-size: 14px;
      margin-top: 5px;
      opacity: 0.8;
    }

    .reason {
      margin-top: 15px;
      font-size: 15px;
    }

    .sources {
      margin-top: 25px;
      text-align: left;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .card a {
      color: #60a5fa;
      text-decoration: none;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 5px;
    }

    .support { background: #065f46; }
    .contradict { background: #991b1b; }
    .neutral { background: #374151; }

  </style>
</head>

<body>

<h1>🧠 AI Fact Checker</h1>

<textarea id="input" placeholder="Enter a claim..."></textarea><br>
<button onclick="check()">Verify</button>

<div id="output"></div>

<script>
const BASE_URL = "https://your-backend-url.onrender.com"; // 🔥 CHANGE THIS

async function check() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");

  output.innerHTML = "Checking...";

  try {
    const res = await fetch(BASE_URL + "/check-news", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    renderResult(data);

  } catch (err) {
    output.innerHTML = "Error connecting to server.";
  }
}


function renderResult(data) {
  const output = document.getElementById("output");

  let className = "uncertain";
  if (data.label === "Real") className = "real";
  if (data.label === "Fake") className = "fake";

  let html = `
    <div class="result ${className}">
      <h2>${data.label}</h2>
      <div class="confidence">Confidence: ${data.confidence}</div>
      <div class="reason">${data.reason}</div>
    </div>
  `;

  if (data.sources && data.sources.length > 0) {
    html += `<div class="sources"><h3>🔎 Evidence</h3>`;

    data.sources.forEach(src => {
      const stanceClass = src.stance || "neutral";

      html += `
        <div class="card">
          <a href="${src.url}" target="_blank">${src.title}</a>
          <div>${src.source || ""}</div>
          <div class="tag ${stanceClass}">
            ${stanceClass.toUpperCase()}
          </div>
        </div>
      `;
    });

    html += `</div>`;
  }

  output.innerHTML = html;
}
</script>

</body>
</html>
