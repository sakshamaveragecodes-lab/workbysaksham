<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas | AI Fact Checker</title>

  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --accent: #3b82f6;
      --real: #10b981;
      --fake: #ef4444;
      --uncertain: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      font-weight: 800;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    textarea {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      min-height: 60px;
      resize: vertical;
    }

    button {
      padding: 15px 30px;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background-color: #2563eb; }

    .result-card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
      border-left: 5px solid transparent;
    }

    .status-Real { border-left-color: var(--real); }
    .status-Fake { border-left-color: var(--fake); }
    .status-Uncertain { border-left-color: var(--uncertain); }

    .result-card h2 {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .source-list {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .source-item {
      background: #0f172a;
      padding: 12px;
      border-radius: 6px;
      color: var(--accent);
      text-decoration: none;
      display: block;
    }

    .source-item span {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .sources-title {
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .input-group {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Veritas | AI Fact Checker</h1>

    <div class="input-group">
      <textarea id="newsInput" placeholder="Paste a news claim or article here..."></textarea>
      <button onclick="checkNews()" id="checkBtn">Verify</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const BASE_URL = "https://workbysaksham.onrender.com";

    async function checkNews() {
      const text = document.getElementById("newsInput").value.trim();
      const resultDiv = document.getElementById("result");
      const btn = document.getElementById("checkBtn");

      if (!text) {
        alert("Please enter some text.");
        return;
      }

      btn.innerText = "Checking...";
      btn.disabled = true;

      resultDiv.innerHTML = "<p style='text-align:center;'>Connecting to server...</p>";

      try {
        // 🔥 Wake up backend (Render sleep fix)
        await fetch(BASE_URL);
        await new Promise(r => setTimeout(r, 1500));

        resultDiv.innerHTML = "<p style='text-align:center;'>Analyzing news...</p>";

        const res = await fetch(BASE_URL + "/check-news", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        if (!res.ok) throw new Error("Server error");

        const data = await res.json();

        let sourcesHTML = "";

        if (data.sources && data.sources.length > 0) {
          sourcesHTML = `
            <div class="sources-title">Sources:</div>
            <div class="source-list">
              ${data.sources.map(s => `
                <a href="${s.url}" target="_blank" class="source-item">
                  ${s.title}
                  <span>${s.source}</span>
                </a>
              `).join("")}
            </div>
          `;
        } else {
          sourcesHTML = `<div class="sources-title">No sources found</div>`;
        }

        resultDiv.innerHTML = `
          <div class="result-card status-${data.label}">
            <h2>${data.label} <span>(${data.confidence})</span></h2>
            <p>${data.reason}</p>
            ${sourcesHTML}
          </div>
        `;

      } catch (error) {
        console.error(error);

        resultDiv.innerHTML = `
          <div class="result-card status-Fake">
            <h2>Connection Error</h2>
            <p>Server is starting or unreachable. Wait a few seconds and try again.</p>
          </div>
        `;
      }

      btn.innerText = "Verify";
      btn.disabled = false;
    }
  </script>
</body>
</html>
