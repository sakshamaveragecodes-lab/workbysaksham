<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Veritas AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.card {
  margin-top: 20px;
  padding: 20px;
  background: #1e293b;
  border-radius: 12px;
}

.verdict {
  font-size: 22px;
  font-weight: bold;
}

.real { color: #22c55e; }
.fake { color: #ef4444; }
.unverified { color: #facc15; }

.bar {
  height: 10px;
  background: #334155;
  border-radius: 10px;
  margin-top: 8px;
}

.fill {
  height: 100%;
  background: #3b82f6;
  border-radius: 10px;
}

.source {
  margin-top: 10px;
  padding: 10px;
  background: #0f172a;
  border-radius: 8px;
}

a {
  color: #60a5fa;
  text-decoration: none;
}

.loading {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧠 Veritas AI</h1>

  <textarea id="input" placeholder="Enter news or claim..."></textarea>

  <button onclick="analyzeNews()">Analyze</button>

  <div class="loading" id="loading"></div>

  <div id="result"></div>
</div>

<script>
const API_URL = "https://your-app.onrender.com"; // 🔴 CHANGE THIS

function getClass(verdict) {
  verdict = verdict.toLowerCase();
  if (verdict.includes("real")) return "real";
  if (verdict.includes("fake")) return "fake";
  return "unverified";
}

async function analyzeNews() {
  const text = document.getElementById("input").value.trim();
  const resultDiv = document.getElementById("result");
  const loading = document.getElementById("loading");

  if (!text) {
    alert("Enter something");
    return;
  }

  loading.innerText = "Analyzing...";
  resultDiv.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/analyze`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    loading.innerText = "";

    const cls = getClass(data.verdict);

    resultDiv.innerHTML = `
      <div class="card">
        <div class="verdict ${cls}">${data.verdict}</div>

        <p>${data.reasoning}</p>

        <p><strong>Confidence:</strong> ${data.confidence}%</p>
        <div class="bar">
          <div class="fill" style="width:${data.confidence}%"></div>
        </div>

        <h3>Sources</h3>
        ${
          data.sources?.length
            ? data.sources.map(s => `
              <div class="source">
                🔗 <a href="${s.url}" target="_blank">${s.title}</a><br/>
                <small>${s.source}</small>
              </div>
            `).join("")
            : "<p>No sources found</p>"
        }
      </div>
    `;

  } catch (err) {
    console.error(err);

    loading.innerText = "";
    resultDiv.innerHTML = `
      <div class="card">
        <p>⚠️ Server error</p>
      </div>
    `;
  }
}
</script>

</body>
</html>
